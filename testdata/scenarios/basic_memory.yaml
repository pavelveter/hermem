name: basic_memory
steps:
  - name: store_entity
    cli:
      args: ["memory", "store"]
      stdin: '{"id":"e1","category":"world","content":"Paris is the capital of France"}'
    expected:
      exit_code: 0

  - name: store_second_entity
    cli:
      args: ["memory", "store"]
      stdin: '{"id":"e2","category":"world","content":"France is in Europe"}'
    expected:
      exit_code: 0

  - name: create_edge
    cli:
      args: ["memory", "edge"]
      stdin: '{"source_id":"e1","target_id":"e2","relation_type":"part_of"}'
    expected:
      exit_code: 0

  - name: search
    cli:
      args: ["memory", "search"]
      stdin: '{"query":"capital of France","top_k":5}'
    expected:
      exit_code: 0

  - name: query
    cli:
      args: ["memory", "query"]
      stdin: '{"query":"Tell me about France"}'
    expected:
      exit_code: 0

  - name: retrieve
    cli:
      args: ["memory", "retrieve"]
      stdin: '{"seed_ids":["e1"]}'
    expected:
      exit_code: 0
