[embedder]
provider = ollama
url = http://ollama:11434
model = nomic-embed-text

[extraction]
provider = ollama
url = http://ollama:11434
model = qwen2.5-coder:7b
temperature = 0.1

[ingestion]
dedup_threshold = 0.88

[database]
; Docker WORKDIR is /data — DB file lands in the persistent volume.
path = hermem.db

[retrieval]
depth_ceiling = 5
max_nodes = 100

[ranking]
; vector_weight = 0.7
; recency_weight = 0.3
; depth_penalty = 0.05
; recency_half_life_hours = 720
; centrality_weight = 0.05

[retention]
observation_ttl = 2160h
run_interval = 1h
batch_size = 500

[vector]
dim = 768

[schema]
allowed_categories = world,opinion,experience,observation,task,milestone
allowed_relations = prefers,uses,mentions,related_to,part_of,causes,contradicts,blocked_by,recovers_via
stateful_categories = task
valid_states = pending,running,completed,failed
relation_blocking = blocked_by
state_unblocking = completed
relation_recovery = recovers_via
