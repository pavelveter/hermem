version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - forbidigo

  settings:
    forbidigo:
      forbid:
        - pattern: ActiveSchema
          msg: "ActiveSchema() is removed — use dependency injection via Env or Service constructor"
          pkg: '^github\.com/pavelveter/hermem'
    errcheck:
      check-blank: true
      check-type-assertions: true

  exclusions:
    rules:
      # Standard Go idioms: defer *.Close() / tx.Rollback() / *.RowsAffected.
      - linters: [errcheck]
        text: 'Error return value of `.*\.Close` is not checked.*'
      - linters: [errcheck]
        text: 'Error return value of `.*\.Rollback` is not checked.*'
      - linters: [errcheck]
        text: 'Error return value of `.*\.RowsAffected` is not checked.*'
      # CLI: stdout/stderr writes (output errors handled via slog).
      - path: src/internal/cli/.*\.go
        linters: [errcheck]
        text: 'Error return value of `.*fmt\.Fprint(f|ln)?` is not checked.*'
      - path: src/internal/cli/.*\.go
        linters: [errcheck]
        text: 'Error return value of `(f\.WriteString?|w\.Flush|os\.Stdin\.Stat|.*\.GetString|io\.ReadAll|os\.Stdout\.Write)` is not checked.*'
      # Server: best-effort body drain and auth-error JSON encode.
      - path: src/internal/server/.*\.go
        linters: [errcheck]
        text: 'Error return value of `(io\.Copy|.*\.Encode|w\.Write)` is not checked.*'
      # AI: retry-drain body + best-effort JSON encode/Decode.
      - path: src/internal/ai/.*\.go
        linters: [errcheck]
        text: 'Error return value of `(io\.Copy|json\.Marshal|io\.ReadAll|.*json\.Decoder.*Decode|.*json\.Encoder.*Encode)` is not checked.*'
      # Metrics: best-effort exposition + flush.
      - path: src/internal/metrics/.*\.go
        linters: [errcheck]
        text: 'Error return value of `(fmt\.Fprintf|db\.Exec|.*\.WriteExposition)` is not checked.*'
      - path: src/internal/cli/metrics\.go$
        linters: [errcheck]
        text: 'Error return value of `.*\.WriteExposition` is not checked.*'
      # httputil: best-effort JSON encoding onto already-locked response.
      - path: src/internal/httputil/.*\.go
        linters: [errcheck]
        text: 'Error return value of `.*json\.Encoder.*Encode` is not checked.*'
      # Tests: ALL errcheck in test files — bootstrap, query, cleanup.
      # Errors are asserted via result values, not via error returns.
      - path: .*_test\.go$
        linters: [errcheck]
        text: '.*'
