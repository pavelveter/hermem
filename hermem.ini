; ── Local embedding (no Ollama/OpenAI needed) ──────────────────────────
; Uncomment model_path to use the embedded llama-embedding binary instead
; of Ollama or OpenAI for vector computation. The GGUF file must exist on
; disk. When set, [embedder] provider/url/key are ignored for embedding.
;[embedding]
;model_path = "./models/nomic-embed-text.gguf"

[embedder]
provider = ollama
url = http://localhost:11434
model = nomic-embed-text
; HTTP request timeout (Go duration). Increase for slow hardware.
; timeout = 30s

[extraction]
; provider, url, key — optional, falls back to [embedder] values
provider = ollama
url = http://localhost:11434
model = qwen2.5-coder:7b
temperature = 0.1
; HTTP request timeout (Go duration). LLM extraction can be slow.
; timeout = 300s
; Comma-separated list of additional entity categories the LLM is
; allowed to emit. Composes with the default set (world, opinion,
; experience, observation); empty entries are silently dropped.
; Example: extra_categories = schema, intent
; extra_categories =
; Comma-separated list of additional relation labels the LLM is
; allowed to emit. Composes with the default set (prefers, uses,
; mentions, related_to, part_of, causes, contradicts); empty
; entries are silently dropped.
; Example: extra_relation_types = supports, blocks, references
; extra_relation_types =

[ingestion]
; Cosine-similarity floor for entity dedup during ingestion.
; Cosine similarity ∈ [0, 1]; 0.88 = "very close in vector space",
; empirically a good default for short factual text.
dedup_threshold = 0.88

[database]
path = hermem.db
; Auto-apply pending migrations during boot. §4 audit closure: default is
; false (production refusal-mode) — the daemon refuses to start against an
; out-of-date schema and prints a hint to run `./hermem db migrate apply`.
; Long-running ALTERs that block boot would otherwise hold the start gate
; open long enough for K8s liveness/readiness probes to kill the pod
; (CrashLoopBackOff on a half-migrated DB). Set true ONLY for:
;   - single-binary docker-compose dev stacks
;   - bench/test fixtures where the operator IS the daemon
;   - environments where the migration apply window is < the probe timeout
; Production recommendation: leave false; run apply in a K8s InitContainer.
; auto_migrate = true

[retrieval]
; Hard upper bound on the requested max_depth, regardless of what callers ask.
; Use this as a safety ceiling; values above it get clamped silently.
depth_ceiling = 5
; Soft cap on total nodes returned by a single RetrieveContext call, so a
; dense graph walk cannot blow up memory or response size.
max_nodes = 100

[ranking]
; Sprint 5: composite scorer weights for the default ranker.
; Zero values fall back to the built-in defaults shown below.
; vector_weight = 0.7
; recency_weight = 0.3
; depth_penalty = 0.05
; recency_half_life_hours = 720   ; 30 days — half-life of exp decay

[reranker]
; Sprint 5: optional post-retrieval reranker.
; Follows the same provider convention as [embedder] / [extraction].
; When provider is empty or the section is absent, reranking is skipped.
; provider = ollama             ; "ollama" (cross-encoder /api/rerank) | "openai" (chat-based)
; url = http://localhost:11434
; model = mxbai-rerank-base
; key =                        ; only needed for openai provider
; timeout = 30s

[retention]
; Observation nodes older than this TTL are archived (excluded from graph walks).
; Go duration format: 2160h = 90 days.
observation_ttl = 2160h
; How often the GC loop fires.
run_interval = 1h
; Max nodes archived per cycle (0 = no limit).
batch_size = 500

[vector]
; Embedding dimension — must match your model's output dim.
; nomic-embed-text = 768, text-embedding-3-small = 1536, mxbai-embed-large = 1024
dim = 768

[schema]
; Declarative graph schema + finite-state machine (FSM) harness.
; If this section is absent, Hermem falls back to classic defaults:
;   categories = world,opinion,experience,observation
;   relations  = prefers,uses,mentions,related_to,part_of,causes,contradicts
;   stateful features are disabled.
; Comma-separated allowlist of entity categories accepted by ingestion
; and validation. Unknown categories are rejected with HTTP 422.
allowed_categories = world,opinion,experience,observation,task,milestone
; Comma-separated allowlist of relation types accepted by ingestion
; and validation. Unknown relations are rejected with HTTP 422.
allowed_relations = prefers,uses,mentions,related_to,part_of,causes,contradicts,blocked_by,recovers_via
; Comma-separated subset of categories that participate in the FSM.
; Nodes in these categories get a lifecycle `status` field automatically
; initialized to the first entry of `valid_states` on creation.
stateful_categories = task
; Ordered list of valid lifecycle states for stateful nodes.
; Transitions outside this set are rejected with HTTP 422.
valid_states = pending,running,completed,failed
; Relation name that expresses a blocking dependency (B waits for A).
; Used by the topological execution engine to compute executable nodes.
relation_blocking = blocked_by
; Target node status that unblocks a dependency.
; When the source of a `relation_blocking` edge reaches this state,
; the dependent node may become executable.
state_unblocking = completed
; Relation name that links a failed task to its compensation/rollback task.
; Used by the recovery lookup endpoint.
relation_recovery = recovers_via
