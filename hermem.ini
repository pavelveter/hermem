[embedder]
provider = ollama
url = http://localhost:11434
model = nomic-embed-text

[extraction]
; provider, url, key — optional, falls back to [embedder] values
provider = ollama
url = http://localhost:11434
model = qwen2.5-coder:7b
temperature = 0.1

[ingestion]
; Cosine-similarity floor for entity dedup during ingestion.
; Cosine similarity ∈ [0, 1]; 0.88 = "very close in vector space",
; empirically a good default for short factual text.
dedup_threshold = 0.88

[database]
path = hermem.db

[retrieval]
; Hard upper bound on the requested max_depth, regardless of what callers ask.
; Use this as a safety ceiling; values above it get clamped silently.
depth_ceiling = 5
; Soft cap on total nodes returned by a single RetrieveContext call, so a
; dense graph walk cannot blow up memory or response size.
max_nodes = 100

[retention]
; Observation nodes older than this TTL are archived (excluded from graph walks).
; Go duration format: 2160h = 90 days.
observation_ttl = 2160h
; How often the GC loop fires.
run_interval = 1h
; Max nodes archived per cycle (0 = no limit).
batch_size = 500

[vector]
; Embedding dimension — must match your model's output dim.
; nomic-embed-text = 768, text-embedding-3-small = 1536, mxbai-embed-large = 1024
dim = 768
