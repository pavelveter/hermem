name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  # id-token: write + attestations: write are scoped tightly to the
  # `provenance` job (see its own `permissions:` block). They are
  # NOT granted at the workflow level so the build matrix
  # (macOS code-signing, etc.) doesn't inherit OIDC + attestations
  # scopes it has no use for.

env:
  GO_VERSION: "1.26.5"
  # Zig 0.16.0 (April 2026) — latest stable that ships `zig cc` for musl + windows-gnu targets.
  # Last user-visible breakage was a pin to non-existent v2.12.2 (Zig 2.x has not shipped).
  ZIG_VERSION: "0.16.0"

jobs:
  version-check:
    name: MAJOR Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Verify MAJOR version matches across server and SDKs
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading 'v' (if present) so MAJOR is just the numeric portion.
          # `${TAG%%.*}` alone on "v0.3.1" returns "v0" (literal "v" prefix), which fails
          # the strict string check against SDK MAJOR values like "0".
          TAG_MAJOR="${TAG#v}"
          TAG_MAJOR="${TAG_MAJOR%%.*}"
          echo "Release tag: $TAG  (MAJOR=$TAG_MAJOR)"

          # Go SDK — module path has no version; check sdk/go/go.mod for a version comment
          # We use the repo-level convention: MAJOR must match the tag MAJOR.
          # If sdk/go/go.mod ever gains a version field, check it here.

          # Python SDK
          PY_VER=$(grep '^version' sdk/python/pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PY_MAJOR="${PY_VER%%.*}"
          echo "Python SDK version: $PY_VER  (MAJOR=$PY_MAJOR)"

          # TypeScript SDK
          TS_VER=$(node -p "require('./sdk/typescript/package.json').version")
          TS_MAJOR="${TS_VER%%.*}"
          echo "TypeScript SDK version: $TS_VER  (MAJOR=$TS_MAJOR)"

          FAIL=0
          if [ "$TAG_MAJOR" != "$PY_MAJOR" ]; then
            echo "::error::MAJOR mismatch: tag=$TAG_MAJOR python=$PY_MAJOR"
            FAIL=1
          fi
          if [ "$TAG_MAJOR" != "$TS_MAJOR" ]; then
            echo "::error::MAJOR mismatch: tag=$TAG_MAJOR typescript=$TS_MAJOR"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::All SDK MAJOR versions must match the server release tag MAJOR."
            exit 1
          fi
          echo "✓ MAJOR versions consistent: tag=$TAG_MAJOR python=$PY_MAJOR typescript=$TS_MAJOR"

  # Build shell completions ONCE on a native x86_64 runner and share the
  # result across the entire build matrix. Previously each matrix entry
  # generated its own by invoking `.$/{{bin}} completion bash|zsh|fish`
  # locally — which fails for cross-compiled targets (linux/arm64,
  # windows/amd64, windows/arm64) because the freshly-built binary cannot
  # be executed on an x86_64 runner ("Exec format error"). Completion
  # scripts target the shell, not the binary's GOOS/GOARCH, so emitting
  # them once from a native build and reusing them is correct.
  completions:
    permissions:
      contents: write
    name: Generate Shell Completions (native x86_64, single source of truth)
    runs-on: ubuntu-latest
    needs: [version-check]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install zig (same toolchain as the matrix for hermetic output parity)
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: ${{ env.ZIG_VERSION }}
          use-tool-cache: true

      # Mirror the matrix's pre-build step: go-sqlite3 / embedder
      # factories require placeholder embed files at compile time
      # (seeded by the bash script). Skipping it risks a build failure
      # deeper than this job's apparent `Build` step, mirroring the
      # exact path matrix entries already use.
      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Build native linux/amd64 hermem and emit shell completions
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "1"
          CC: zig cc -target x86_64-linux-musl
        run: |
          mkdir -p completions
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          VERSION="${GITHUB_REF_NAME}"
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.version=${VERSION} \
              -X main.buildDate=${BUILD_DATE} \
              -X main.gitCommit=${GIT_COMMIT}" \
            -o hermem \
            ./src
          ./hermem completion bash > completions/hermem.bash
          ./hermem completion zsh  > completions/hermem.zsh
          ./hermem completion fish > completions/hermem.fish

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: completions
          path: completions/

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: [version-check, completions]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: zig cc -target x86_64-linux-musl
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: zig cc -target aarch64-linux-musl
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cc: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cc: ""
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cc: zig cc -target x86_64-windows-gnu
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
            cc: zig cc -target aarch64-windows-gnu

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Install zig
        if: matrix.goos != 'darwin'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: ${{ env.ZIG_VERSION }}
          use-tool-cache: true

      - name: Determine binary and archive names
        id: names
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            echo "bin=hermem.exe" >> "$GITHUB_OUTPUT"
            echo "archive=hermem-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" >> "$GITHUB_OUTPUT"
          else
            echo "bin=hermem" >> "$GITHUB_OUTPUT"
            echo "archive=hermem-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          VERSION="${GITHUB_REF_NAME}"

          go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.version=${VERSION} \
              -X main.buildDate=${BUILD_DATE} \
              -X main.gitCommit=${GIT_COMMIT}" \
            -o "${{ steps.names.outputs.bin }}" \
            ./src

      - name: Strip binary (Linux)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: strip "${{ steps.names.outputs.bin }}"

      - name: Strip binary (macOS)
        if: matrix.goos == 'darwin'
        run: strip -x "${{ steps.names.outputs.bin }}"

      - name: Code sign & Notarize (macOS)
        if: matrix.goos == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PWD: ${{ secrets.APPLE_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_ID" ]; then
            KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
            CERT_PATH=$RUNNER_TEMP/certificate.p12

            echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
            security create-keychain -p "" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "" "$KEYCHAIN_PATH"
            security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

            codesign --sign "Developer ID Application" --options runtime --timestamp --hard "${{ steps.names.outputs.bin }}"

            zip hermem_notary.zip "${{ steps.names.outputs.bin }}"

            xcrun notarytool submit hermem_notary.zip \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait

            rm hermem_notary.zip
          else
            echo "Skipping signing/notarization — missing Apple credentials"
          fi

      - name: Clean up signing keychain
        if: always() && matrix.goos == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_ID" ]; then
            security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
          fi

      # Download the shared `completions/` directory emitted by the
      # `completions` job. We can't invoke ./hermem completion ...
      # locally: the freshly-cross-compiled binary may not be executable
      # on the x86_64 runner (e.g. linux/arm64, windows/amd64,
      # windows/arm64 fail with "Exec format error"). Completion scripts
      # depend on the cobra command tree, NOT on the binary's GOOS/GOARCH,
      # so reusing a single natively-generated set across all 6 matrix
      # targets is content-equivalent.
      - name: Download shared shell completions (completions/ directory)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: completions
          path: completions

      - name: Create final release archive
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${{ steps.names.outputs.archive }}" "${{ steps.names.outputs.bin }}" completions/*
          else
            tar czf "${{ steps.names.outputs.archive }}" "${{ steps.names.outputs.bin }}" completions/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.names.outputs.archive }}

  checksums:
    permissions:
      contents: write
    name: Checksums
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) \
            -exec sha256sum {} \; | sed 's|./[^/]*/||' > ../checksums-sha256.txt
          cat ../checksums-sha256.txt

      - name: Upload checksums
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: checksums
          path: checksums-sha256.txt

  # SLSA Build L2 provenance — one signed in-toto attestation per
  # build matrix artifact (6 archives + checksums-sha256.txt),
  # recorded against the GH-native attestations API and shown in
  # the release UI as a "Verified" badge. Verifiable with
  # `gh attestation verify <asset> --owner pavelveter`. The
  # `release` job's `needs` includes `provenance` purely as an
  # ordering guarantee — the release step never touches the
  # provenance artifacts (it talks to the GH API directly).
  provenance:
    name: SLSA Build Provenance
    runs-on: ubuntu-latest
    needs: [build, checksums]
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts

      - name: Attest release assets (SLSA Build L2)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/checksums-sha256.txt

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, checksums, provenance]
    # Per-job scope lift: this is the only job whose GITHUB_TOKEN must
    # create the GitHub Release (POST /releases), which requires
    # `contents: write`. The job only downloads artifacts from earlier
    # matrix jobs and copies selected files (binaries, completions,
    # checksums) into a new GitHub Release; it does NOT mint OIDC
    # tokens (only `provenance` legitimately needs `id-token: write`)
    # and does NOT need to read SLSA attestations (those attach to the
    # release assets via GitHub's native provenance display, not via
    # GITHUB_TOKEN scopes).
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "checksums-sha256.txt" \) \
            -exec cp {} release/ \;
          echo "Release assets:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d  # v3
        with:
          generate_release_notes: true
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
