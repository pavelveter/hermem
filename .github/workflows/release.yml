name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"
  # Zig 0.16.0 (April 2026) — latest stable that ships `zig cc` for musl + windows-gnu targets.
  # Last user-visible breakage was a pin to non-existent v2.12.2 (Zig 2.x has not shipped).
  ZIG_VERSION: "0.16.0"

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: zig cc -target x86_64-linux-musl
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: zig cc -target aarch64-linux-musl
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cc: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cc: ""
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cc: zig cc -target x86_64-windows-gnu
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
            cc: zig cc -target aarch64-windows-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Install zig
        if: matrix.goos != 'darwin'
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          use-tool-cache: true

      - name: Determine binary and archive names
        id: names
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            echo "bin=hermem.exe" >> "$GITHUB_OUTPUT"
            echo "archive=hermem-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" >> "$GITHUB_OUTPUT"
          else
            echo "bin=hermem" >> "$GITHUB_OUTPUT"
            echo "archive=hermem-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          VERSION="${GITHUB_REF_NAME}"

          go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.version=${VERSION} \
              -X main.buildDate=${BUILD_DATE} \
              -X main.gitCommit=${GIT_COMMIT}" \
            -o "${{ steps.names.outputs.bin }}" \
            ./src

      - name: Strip binary (Linux)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: strip "${{ steps.names.outputs.bin }}"

      - name: Strip binary (macOS)
        if: matrix.goos == 'darwin'
        run: strip -x "${{ steps.names.outputs.bin }}"

      - name: Code sign & Notarize (macOS)
        if: matrix.goos == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PWD: ${{ secrets.APPLE_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_ID" ]; then
            KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
            CERT_PATH=$RUNNER_TEMP/certificate.p12

            echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
            security create-keychain -p "" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "" "$KEYCHAIN_PATH"
            security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

            codesign --sign "Developer ID Application" --options runtime --timestamp --hard "${{ steps.names.outputs.bin }}"

            zip hermem_notary.zip "${{ steps.names.outputs.bin }}"

            xcrun notarytool submit hermem_notary.zip \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait

            rm hermem_notary.zip
          else
            echo "Skipping signing/notarization — missing Apple credentials"
          fi

      - name: Clean up signing keychain
        if: always() && matrix.goos == 'darwin'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_ID" ]; then
            security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
          fi

      - name: Create final release archive
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${{ steps.names.outputs.archive }}" "${{ steps.names.outputs.bin }}"
          else
            tar czf "${{ steps.names.outputs.archive }}" "${{ steps.names.outputs.bin }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.names.outputs.archive }}

  checksums:
    name: Checksums
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) \
            -exec sha256sum {} \; | sed 's|./[^/]*/||' > ../checksums-sha256.txt
          cat ../checksums-sha256.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums-sha256.txt

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, checksums]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "checksums-sha256.txt" \) \
            -exec cp {} release/ \;
          echo "Release assets:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
