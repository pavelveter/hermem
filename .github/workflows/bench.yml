name: Benchmarks

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "src/**/*.go"
      - "bench/baseline/**"
      - ".github/workflows/bench.yml"

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -count=6 -timeout 300s \
            -run='^$' ./src/... | tee bench_results.txt

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@v0.0.0-20260615155930-9e4b9ddef5b6

      - name: Compare against baseline
        if: hashFiles('bench/baseline/baseline.txt') != ''
        run: |
          benchstat bench/baseline/baseline.txt bench_results.txt | tee bench_report.txt
          # Check for >5% regression on hot paths
          if grep -qE 'delta.*\+[5-9][0-9]\.%|\+1[0-9][0-9]\.%|\+2[0-9][0-9]\.%|\+3[0-9][0-9]\.%|\+4[0-9][0-9]\.%|\+5[0-9][0-9]\.%' bench_report.txt; then
            echo "::error::Benchmark regression >5% detected on a hot path"
            exit 1
          fi
          echo "No significant regression detected"

      - name: Analyze results (standalone)
        if: hashFiles('bench/baseline/baseline.txt') == ''
        run: |
          benchstat bench_results.txt | tee bench_report.txt

      - name: Generate report
        run: |
          echo "## Benchmark Results (${{ github.ref_name }})" > bench_report.md
          echo '```' >> bench_report.md
          cat bench_report.txt >> bench_report.md
          echo '```' >> bench_report.md

      # GitHub artifact names cannot contain "/". On pull_request events
      # `github.ref_name` is "<pr_number>/merge" (e.g. 22/merge) which
      # actions/upload-artifact@v7 rejects with:
      #   "The artifact name is not valid: ..."
      # Compute a slash-safe name in a sibling step and consume it via
      # ${{ steps.bench-name.outputs.name }} below. The shell substitution
      # also handles branch names containing "/" (e.g. scorecard/pr1-...).
      - name: Compute slash-safe artifact name
        id: bench-name
        run: |
          SAFE_REF=$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')
          echo "name=benchmark-results-${SAFE_REF}" >> "$GITHUB_OUTPUT"

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: ${{ steps.bench-name.outputs.name }}
          path: bench_results.txt
          retention-days: 90