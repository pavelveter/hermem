name: Bench

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  bench:
    name: Go benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem ./src/... | tee bench.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench.txt
          retention-days: 14
