name: Benchmarks

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -count=6 -timeout 300s \
            -run='^$' ./src/... | tee bench_results.txt

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Analyze results
        run: |
          benchstat bench_results.txt > bench_report.txt
          echo "## Benchmark Results (${{ github.ref_name }})" > bench_report.md
          echo '```' >> bench_report.md
          cat bench_report.txt >> bench_report.md
          echo '```' >> bench_report.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.ref_name }}
          path: bench_results.txt
          retention-days: 90
