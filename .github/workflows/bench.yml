name: Benchmarks

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

env:
  GO_VERSION: "1.26"

jobs:
  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -count=6 -timeout 300s \
            -run='^$' ./src/... | tee bench_results.txt

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Analyze results
        if: github.event_name == 'pull_request'
        run: |
          benchstat bench_results.txt > bench_report.txt
          echo "## Benchmark Results" > bench_comment.md
          echo '```' >> bench_comment.md
          cat bench_report.txt >> bench_comment.md
          echo '```' >> bench_comment.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('bench_comment.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench_results.txt
          retention-days: 30
