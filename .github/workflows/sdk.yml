name: SDK Tests

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "sdk/**"
      - ".github/workflows/sdk.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "sdk/**"
      - ".github/workflows/sdk.yml"

permissions:
  contents: read

jobs:
  go-sdk:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: sdk/go/go.sum

      - name: Run tests
        run: go test -race -count=1 -timeout 5m ./...

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v5

      # setup-uv installs Python (since python-version is set) and uv in a
      # single action. Replacing actions/setup-python@v5 — the latter's
      # wheel cache would be wasted because uv manages its own cache.
      - uses: astral-sh/setup-uv@v1
        with:
          python-version: "3.12"

      # `uv sync --extra=dev` honors uv.lock deterministically. The
      # earlier `pip install -e ".[dev]"` re-resolved from pyproject.toml
      # and could pick a newer version than what uv.lock pins.
      - name: Install dependencies
        run: uv sync --extra=dev

      - name: Run tests
        run: uv run pytest tests/ -v

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        # `npm ci` strictly honors package-lock.json (vs `npm install`
        # which may silently re-resolve optional/peer deps). This is the
        # whole point of committing the lockfile — H7.
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npx vitest run
