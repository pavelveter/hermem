name: SDK Tests

# Triggers:
#  - push to main: full matrix runs.
#  - tags v*: full matrix runs; tag-pipeline UX depends on this.
#  - PRs touching sdk/**, src/internal/api/** (server contracts
#    the SDKs depend on), or this workflow file: full matrix runs.
#    The src/internal/api/** path broadens the previous filter to
#    catch server-side serialization changes that break SDKs
#    without touching sdk/ itself.
# Release-gating (TODO H3 sub-task 4) is OUT OF SCOPE here: this
# workflow does not gate releases; release.yml is responsible for
# that. A future commit should add `needs: [go-sdk, python-sdk,
# typescript-sdk]` to release.yml::build-release once those
# matrix job IDs stabilize.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "sdk/**"
      - "src/internal/api/**"
      - ".github/workflows/sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/**"
      - "src/internal/api/**"
      - ".github/workflows/sdk.yml"

permissions:
  contents: read

# Cancel previous in-progress runs of this workflow for the same
# branch/ref when a new push lands. CI minutes are cheaper than
# stale-output confusion, and a fresh run after a force-push is
# always more useful than the half-done previous one. Per-branch
# (sdk-${{ github.ref }}) so an unrelated branch's run isn't killed.
concurrency:
  group: sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-sdk:
    name: Go SDK (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # sdk/go/go.mod declares `go 1.21`; matrix covers the
      # floor (1.21) plus the next-minor (1.22). Future bump
      # to support newer Go: append the version here AND in
      # the main module's go.mod directive.
      matrix:
        go-version: ["1.21", "1.22"]
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: sdk/go/go.sum

      - name: Run tests
        # Atomic mode lets go tool cover sum partial coverage across
        # multiple runs (collected by codecov etc); count=1 prevents
        # flake from cached previous results. atomic is required by
        # GitHub CodeCov upload steps; harmless if only artifact-
        # uploading. -race catches concurrency bugs the SDK's
        # httptest.NewServer helpers are designed to surface.
        run: >
          go test
          -race
          -count=1
          -timeout 5m
          -coverprofile=coverage.out
          -covermode=atomic
          ./...

      - name: Upload coverage
        # Upload even on failure so a coverage regression can be
        # investigated alongside the test names in the CI summary.
        # Artifact name embeds the go-version so per-flavor reports
        # don't collide in the workflow-artifacts panel.
        # `if-no-files-found: warn` so a missing coverage.out (the
        # Go test step failed before writing it) produces a soft
        # warning rather than an opaque "file not found" failure
        # that masks the underlying test failure. The Go test
        # step's exit code is the real signal.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: success() || failure()
        with:
          name: coverage-go-${{ matrix.go-version }}
          path: sdk/go/coverage.out
          if-no-files-found: warn
          retention-days: 30

  python-sdk:
    name: Python SDK (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # pyproject.toml declares requires-python = ">=3.9"; matrix
      # covers 3.11 (first 3.x with full typing) and 3.12 (latest
      # stable). Future bump: append newer versions here.
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      # setup-uv installs Python (since python-version is set) and
      # uv in a single action. Replacing actions/setup-python@v5 —
      # the latter's wheel cache would be wasted because uv manages
      # its own cache.
      - uses: astral-sh/setup-uv@cda7432b7ae1feb69168d44b610cb8e3cdbd09b0  # v1
        with:
          python-version: ${{ matrix.python-version }}

      # `uv sync --extra=dev` honors uv.lock deterministically. The
      # earlier `pip install -e ".[dev]"` re-resolved from
      # pyproject.toml and could pick a newer version than what
      # uv.lock pins.
      - name: Install dependencies
        run: uv sync --extra=dev

      - name: Run tests
        # pytest-cov (added in pyproject.toml dev extras) emits:
        #  - term : terminal summary (always on)
        #  - xml  : Cobertura XML for codecov / SonarQube / etc.
        # --cov=hermem scopes coverage to the package source (excludes
        # tests/ itself). --cov-report=term-missing prints uncovered
        # line ranges to the CI log for fast triage.
        run: >
          uv run pytest tests/
          --cov=hermem
          --cov-report=term-missing
          --cov-report=xml:coverage.xml

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: success() || failure()
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: sdk/python/coverage.xml
          if-no-files-found: warn
          retention-days: 30

  typescript-sdk:
    name: TypeScript SDK (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Matrix covers Node 20 (current LTS) and Node 22 (newest LTS
      # at this writing). No "engines" lower-bound in package.json;
      # adding 18 would catch the next-LTS-drop cleanly.
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        # `npm ci` strictly honors package-lock.json (vs `npm
        # install` which may silently re-resolve optional/peer
        # deps). This is the whole point of committing the
        # lockfile — H7.
        run: npm ci --no-audit --no-fund

      - name: Run tests
        # --coverage flag enables the coverage block in
        # vitest.config.ts. Without --coverage, vitest skips
        # coverage entirely — no `./coverage/` directory is
        # produced. Reporters emit text/lcov/json/html to
        # ./coverage/.
        run: npx vitest run --coverage

      - name: Upload coverage
        # Upload the entire ./coverage/ directory; the html/ folder
        # gives developers a browsable report from the artifact
        # download step.
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: success() || failure()
        with:
          name: coverage-typescript-node-${{ matrix.node-version }}
          path: sdk/typescript/coverage
          if-no-files-found: warn
          retention-days: 30
