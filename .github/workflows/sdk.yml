name: SDK Tests

on:
  push:
    branches: [main, master]
    tags: ["v*"]
    paths:
      - "sdk/**"
      - ".github/workflows/sdk.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "sdk/**"
      - ".github/workflows/sdk.yml"

permissions:
  contents: read

jobs:
  go-sdk:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: sdk/go/go.sum

      - name: Run tests
        run: go test -race -count=1 -timeout 5m ./...

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v

  typescript-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx vitest run
