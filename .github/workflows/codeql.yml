name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["go"]
    # Job-level scope lift: the analyze job needs `security-events: write`
    # to upload SARIF (results.sarif) to the code-scanning dashboard.
    # `contents: read` stays the workflow-level default and is inherited here
    # (additive — explicit declaration documents the intent).
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: github/codeql-action/init@e8e8e51caba890f74f97e228d00b0b81b666ee4c  # v3
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@e8e8e51caba890f74f97e228d00b0b81b666ee4c  # v3

      - uses: github/codeql-action/analyze@e8e8e51caba890f74f97e228d00b0b81b666ee4c  # v3
        with:
          category: "/language:${{ matrix.language }}"
