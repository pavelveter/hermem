name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["go"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: github/codeql-action/init@e8e8e51caba890f74f97e228d00b0b81b666ee4c  # v3
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@e8e8e51caba890f74f97e228d00b0b81b666ee4c  # v3

      - uses: github/codeql-action/analyze@e8e8e51caba890f74f97e228d00b0b81b666ee4c  # v3
        with:
          category: "/language:${{ matrix.language }}"
