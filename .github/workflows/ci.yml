name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "docs/**"
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: go build
        run: go build ./src/...

  guardrails:
    name: Architecture Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Forbid ActiveSchema() usage
        run: |
          if grep -rn 'ActiveSchema()' src/ --include='*.go'; then
            echo "::error::ActiveSchema() is removed — use dependency injection via Env or Service constructor"
            exit 1
          fi
          echo "No ActiveSchema() usage found — OK"

      - name: Forbid package-level mutable state in critical packages
        run: |
          if grep -rn 'var RequiredScopes' src/ --include='*.go'; then
            echo "::error::RequiredScopes must remain unexported to prevent mutation"
            exit 1
          fi
          echo "No exported mutable state violations — OK"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          if [ -n "$(gofmt -s -d .)" ]; then
            echo "::error::gofmt differences found"
            gofmt -s -d .
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: .
          args: --timeout=5m

  fuzz:
    name: Short Fuzz
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Fuzz store.splitSQL
        run: go test -fuzz=FuzzSplitSQL -fuzztime=10s ./src/internal/store/...

      - name: Fuzz vector.CosineSimilarity
        run: go test -fuzz=FuzzCosineSimilarity -fuzztime=10s ./src/internal/vector/...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic -timeout 10m $(go list ./... | grep -v tests/e2e)

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Build binary
        run: go build -o hermem ./src

      - name: Run E2E tests
        run: go test -p 1 ./tests/e2e/... -timeout 5m

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./src/...

  apidiff:
    name: API Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Install go-apidiff
        run: go install github.com/jimmidyson/go-apidiff@latest 2>/dev/null || true
        continue-on-error: true

      - name: Check API compatibility
        run: |
          if ! command -v go-apidiff &>/dev/null; then
            echo "go-apidiff not installed — skipping"
            exit 0
          fi
          # Compare against the last tagged release
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "No tags found — skipping API compatibility check"
            exit 0
          fi
          go-apidiff "$LATEST_TAG" --print-compatible

  openapi:
    name: OpenAPI Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Run OpenAPI spec validation tests
        run: go test -run 'Test(Spec|Paths|Schemas|Operation|Snapshot|Every)' ./api/... -v

  gitleaks:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  gosec:
    name: Security Scan (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude-generated -exclude-dir=tests -exclude=G104,G115,G202,G304,G306,G201,G204,G103,G301,G404,G703 ./src/...
