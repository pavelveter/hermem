name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "docs/**"
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: go build
        run: go build ./src/...

  guardrails:
    name: Architecture Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Forbid ActiveSchema() usage
        run: |
          if grep -rn 'ActiveSchema()' src/ --include='*.go'; then
            echo "::error::ActiveSchema() is removed — use dependency injection via Env or Service constructor"
            exit 1
          fi
          echo "No ActiveSchema() usage found — OK"

      - name: Forbid package-level mutable state in critical packages
        run: |
          if grep -rn 'var RequiredScopes' src/ --include='*.go'; then
            echo "::error::RequiredScopes must remain unexported to prevent mutation"
            exit 1
          fi
          echo "No exported mutable state violations — OK"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          if [ -n "$(gofmt -s -d .)" ]; then
            echo "::error::gofmt differences found"
            gofmt -s -d .
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa  # v7
        with:
          version: v2.12.2
          working-directory: .
          args: --timeout=5m

  fuzz:
    name: Short Fuzz
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Fuzz store.splitSQL
        run: go test -fuzz=FuzzSplitSQL -fuzztime=10s ./src/internal/store/...

      - name: Fuzz vector.CosineSimilarity
        run: go test -fuzz=FuzzCosineSimilarity -fuzztime=10s ./src/internal/vector/...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic -timeout 10m $(go list ./... | grep -v tests/e2e)

      # Fails the build if total coverage drops below the threshold. The
      # current threshold (50.0%) is a no-regression guard — it sits
      # ~2.6% below today's measured coverage (52.6%) so a single
      # flaky test run (e.g. a timing-sensitive skip) cannot push the
      # measured total under the gate. The long-term target is 70%
      # (see M2 sub-tasks in TODO.md). Raise the THRESHOLD value by
      # ~3% per minor release until 70% is reached; once 70% is
      # stable, raise the README badge color from yellow to
      # brightgreen to signal "we hit the target".
      #
      # Implementation note: pure shell (no Codecov / bc dependency).
      # `go tool cover -func` emits a per-function table; the trailing
      # `total:` line carries the aggregate percentage. The awk END
      # action captures that line's third whitespace-separated field
      # (e.g. `52.6%` → `52.6`). The comparison is performed inside awk
      # because awk understands floats natively; bash's `[ "$a" -lt "$b" ]`
      # is integer-only and would miscompare `52.6 < 50.0`.
      - name: Coverage threshold gate
        run: |
          THRESHOLD="50.0"
          TOTAL=$(go tool cover -func=coverage.out | awk 'END{print $3}' | tr -d '%')
          if [ -z "$TOTAL" ] || [ "$TOTAL" = "0.0" ]; then
            echo "::error::Failed to parse coverage.out or coverage is 0% (test job may have produced no coverage data)"
            exit 1
          fi
          awk -v total="$TOTAL" -v thresh="$THRESHOLD" 'BEGIN {
            if (total+0 < thresh+0) {
              print "::error::Test coverage " total "% is below required threshold of " thresh "%"
              exit 1
            } else {
              print "Coverage " total "% meets/exceeds threshold (" thresh "%)"
            }
          }'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Build binary
        run: go build -o hermem ./src

      - name: Run E2E tests
        run: go test -p 1 ./tests/e2e/... -timeout 5m

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

      - name: Run govulncheck
        run: govulncheck ./src/...

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  openapi:
    name: OpenAPI Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Run OpenAPI spec validation tests
        run: go test -run 'Test(Spec|Paths|Schemas|Operation|Snapshot|Every)' ./api/... -v

  gitleaks:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  gosec:
    name: Security Scan (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        run: scripts/ensure-embed-placeholders.sh

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1

      - name: Run gosec
        run: gosec -exclude-generated -exclude-dir=tests -exclude=G104,G115,G202,G304,G306,G201,G204,G103,G301,G404,G703 ./src/...

  modtidy:
    name: Go mod tidy guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create embedding placeholders
        # `go mod tidy` invokes `go list ./...` internally, which
        # surfaces any //go:embed directive pointing at a missing
        # file. Sibling jobs (test/lint/e2e/fuzz/govulncheck/gosec/
        # openapi) all run this step — modtidy matches for parity.
        run: scripts/ensure-embed-placeholders.sh

      - name: Check go.mod / go.sum tidiness
        # Fails the build if `go mod tidy` would mutate either file.
        # Catches accidental upstream dep edits that aren't reflected in
        # the committed go.sum (e.g. PR adding a new import without
        # regenerating). Implementation is exactly the workflow
        # recommended in CONTRIBUTING.md § "Branch hygiene".
        run: |
          go mod tidy
          if [ -n "$(git diff -- go.mod go.sum)" ]; then
            echo "::error::go.mod or go.sum is not tidy — run 'go mod tidy' locally and commit"
            git diff -- go.mod go.sum | head -200
            exit 1
          fi
