name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "*.md"
      - "docs/**"
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
          working-directory: .
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test -race -count=1 -timeout 10m ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: zig cc -target x86_64-linux-musl
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: zig cc -target aarch64-linux-musl
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cc: ""
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cc: ""
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cc: zig cc -target x86_64-windows-gnu
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
            cc: zig cc -target aarch64-windows-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install zig
        if: matrix.goos != 'darwin'
        uses: mlugg/setup-zig@v2
        with:
          version: v2.12.2

      - name: Determine extension
        id: ext
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            echo "ext=.exe" >> "$GITHUB_OUTPUT"
          else
            echo "ext=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          VERSION="${GITHUB_REF_NAME:-dev}"

          go build \
            -trimpath \
            -ldflags="-s -w \
              -X main.version=${VERSION} \
              -X main.buildDate=${BUILD_DATE} \
              -X main.gitCommit=${GIT_COMMIT}" \
            -o "hermem-${{ matrix.goos }}-${{ matrix.goarch }}${{ steps.ext.outputs.ext }}" \
            ./src

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermem-${{ matrix.goos }}-${{ matrix.goarch }}
          path: hermem-${{ matrix.goos }}-${{ matrix.goarch }}${{ steps.ext.outputs.ext }}
          retention-days: 7
