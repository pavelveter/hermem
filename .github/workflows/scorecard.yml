name: OpenSSF Scorecard

on:
  push:
    branches: [main]

# Workflow-level: only grant `contents: read` so future jobs inherit the
# principle of least privilege by default.
permissions:
  contents: read

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    # Job-level scope lift: scorecard-action needs `id-token: write` to mint
    # the OIDC tokens used in its provenance attestations (must be write,
    # not read — per scorecard-action@vx README). codeql-action/upload-sarif
    # needs `security-events: write` to publish results.sarif to the
    # code-scanning dashboard. Everything else stays at the workflow-level
    # read default.
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@e8e8e51caba890f74f97e228d00b0b81b666ee4c  # v3
        with:
          sarif_file: results.sarif
